<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />

	<!-- Primary Meta Tags -->
	<title>Fl4wless's Personal portfolio</title>
	<meta name="title" content="Fl4wless's Personal portfolio">
	<meta name="description"
		content="Hey, I'm Fl4wless aka Noah and a developer from germany. Check out my portfolio to learn more about me!">

	<!-- Open Graph / Facebook -->
	<meta property="og:type" content="website">
	<meta property="og:url" content="https://fl4wless.de/">
	<meta property="og:title" content="Fl4wless's Personal portfolio">
	<meta property="og:description"
		content="Hey, I'm Fl4wless aka Noah and a developer from germany. Check out my portfolio to learn more about me!">
	<meta property="og:image" content="#">
	<meta name="theme-color" content="#7E78DC">

	<!-- Twitter -->
	<meta property="twitter:card" content="summary_large_image">
	<meta property="twitter:url" content="https://fl4wless.de/">
	<meta property="twitter:title" content="Fl4wless's Personal portfolio">
	<meta property="twitter:description"
		content="Hey, I'm Fl4wless aka Noah and a developer from germany. Check out my portfolio to learn more about me!">
	<meta property="twitter:image" content="#">

	<!-- Icon -->
	<link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
	<link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">

	<!-- Manifest -->
	<link rel="manifest" href="site.webmanifest">

	%sveltekit.head%
</head>

<body class="bg-neutral-900 text-neutral-50">
	<div>%sveltekit.body%</div>

	<script type="text/javascript" src="../node_modules/TagCloud/dist/TagCloud.min.js"></script>
</body>

</html>
